<div class="calendar-card">

    <h1 class="calendar-title">
        Kapan sayangku free? 
    </h1>

  
    <div class="mt-4">

        <label>Tanggal</label>

        <input
            type="date"
            id="datePick"
            class="form-control"
        >

    </div>

    <div class="mt-3">

        <label>Jam</label>

        <input
            type="time"
            id="timePick"
            class="form-control"
            value="19:00"
        >

    </div>

   <button id="btnConfirm" class="btn btn-primary w-100 mt-3">
    Konfirmasi Tanggal 
</button>

    <div id="resultDate" class="mt-4"></div>

</div>
